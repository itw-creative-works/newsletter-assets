<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    .loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #666; font-size: 18px; }
    .error { display: flex; align-items: center; justify-content: center; height: 100vh; color: #c00; font-size: 18px; text-align: center; padding: 2rem; }
    .hub { max-width: 600px; margin: 4rem auto; padding: 2rem; text-align: center; }
    .hub h1 { font-size: 24px; margin-bottom: 1rem; color: #333; }
    .hub p { color: #666; line-height: 1.6; }
    .hub code { background: #e8e8e8; padding: 2px 6px; border-radius: 3px; font-size: 14px; }
    iframe { width: 100%; height: 100vh; border: none; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    (function() {
      var params = new URLSearchParams(location.search);
      var path = params.get('path');
      var branch = params.get('branch');
      var app = document.getElementById('app');

      if (!path) {
        app.innerHTML = '<div class="hub">'
          + '<h1>Newsletter Assets</h1>'
          + '<p>Append <code>?path=brandId/campaignId/newsletter.html&branch=brandId</code> to preview a newsletter.</p>'
          + '</div>';
        return;
      }

      app.innerHTML = '<div class="loading">Loading preview…</div>';

      var rawUrl = 'https://raw.githubusercontent.com/itw-creative-works/newsletter-assets/'
        + encodeURIComponent(branch || 'main') + '/' + path;

      fetch(rawUrl)
        .then(function(r) {
          if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
          return r.text();
        })
        .then(function(html) {
          app.innerHTML = '';
          var iframe = document.createElement('iframe');
          iframe.sandbox = 'allow-same-origin';
          app.appendChild(iframe);
          iframe.contentDocument.open();
          iframe.contentDocument.write(html);
          iframe.contentDocument.close();
          document.title = 'Preview: ' + path.split('/').pop();
        })
        .catch(function(err) {
          app.innerHTML = '<div class="error">Failed to load newsletter: ' + err.message
            + '<br><br><a href="' + rawUrl + '">Try raw URL</a></div>';
        });
    })();
  </script>
</body>
</html>
